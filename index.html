<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猜數字（1–100）</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --success: #16a34a;
      --danger: #dc2626;
      --warn: #d97706;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #guessInput {
      flex: 1;
      min-width: 120px;
      padding: 12px 16px;
      font-size: 1.1rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text);
    }

    #guessInput:focus {
      border-color: var(--primary);
    }

    #guessInput:disabled {
      background: var(--bg);
      color: var(--muted);
      cursor: not-allowed;
    }

    button {
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button:active { transform: scale(0.97); }

    #submitBtn {
      background: var(--primary);
      color: #fff;
    }

    #submitBtn:hover:not(:disabled) { background: var(--primary-dark); }
    #submitBtn:disabled { background: #a5b4fc; cursor: not-allowed; }

    #restartBtn {
      background: #10b981;
      color: #fff;
      display: none;
    }

    #restartBtn:hover { background: #059669; }

    /* Message area */
    #message {
      text-align: center;
      font-size: clamp(1.3rem, 5vw, 1.9rem);
      font-weight: 700;
      min-height: 2.4em;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 8px 12px;
      transition: all 0.2s;
    }

    #message.msg-default { color: var(--muted); }
    #message.msg-high    { color: var(--danger); background: #fee2e2; }
    #message.msg-low     { color: var(--primary); background: #ede9fe; }
    #message.msg-win     { color: var(--success); background: #dcfce7; }
    #message.msg-error   { color: var(--warn); background: #fef3c7; font-size: 1.1rem; }

    /* Range hint */
    #rangeHint {
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
      min-height: 1.4em;
    }

    /* History */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #clearBtn {
      background: transparent;
      color: var(--danger);
      border: 1.5px solid var(--danger);
      padding: 4px 12px;
      font-size: 0.82rem;
      border-radius: 6px;
    }

    #clearBtn:hover { background: #fee2e2; }

    #historyList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
    }

    #historyList:empty::after {
      content: "尚無紀錄";
      color: var(--muted);
      font-size: 0.9rem;
      display: block;
      text-align: center;
      padding: 12px 0;
    }

    #historyList li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.9rem;
    }

    #historyList li .round-info { color: var(--text); font-weight: 600; }
    #historyList li .round-guesses { color: var(--primary); font-weight: 700; }
    #historyList li .round-time { color: var(--muted); font-size: 0.78rem; }
    #historyList li.best-record { border: 2px solid #fbbf24; background: #fffbeb; }
    #historyList li.best-record .round-guesses { color: var(--success); }

    @media (max-width: 400px) {
      .card { padding: 16px; }
      .input-area { gap: 8px; }
      button { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <h1>🔢 猜數字（1–100）</h1>

  <div class="container">
    <!-- Status Bar -->
    <div class="card status-bar">
      <div class="stat">
        <span class="stat-label">局數</span>
        <span class="stat-value" id="roundNum">1</span>
      </div>
      <div class="stat">
        <span class="stat-label">本局猜測次數</span>
        <span class="stat-value" id="guessCount">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">最佳成績</span>
        <span class="stat-value" id="bestScore">—</span>
      </div>
    </div>

    <!-- Game Card -->
    <div class="card">
      <div id="message" class="msg-default" role="alert" aria-live="polite">請開始猜數字！</div>
      <div id="rangeHint"></div>

      <div class="input-area" style="margin-top:16px;">
        <input
          type="number"
          id="guessInput"
          placeholder="請輸入 1~100"
          min="1"
          max="100"
          autocomplete="off"
          aria-label="猜測數字輸入框"
        />
        <button id="submitBtn" aria-label="送出猜測">送出</button>
        <button id="restartBtn" aria-label="再玩一次">再玩一次</button>
      </div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="history-header">
        <h2>歷史紀錄</h2>
        <button id="clearBtn" aria-label="清除所有紀錄">清除紀錄</button>
      </div>
      <ul id="historyList" aria-label="歷史紀錄列表"></ul>
    </div>
  </div>

  <script>
    // ─── State ──────────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'guessnum_history';

    let state = {
      answer: 0,
      guessCount: 0,
      isFinished: false,
      round: 1,
      rangeMin: 1,
      rangeMax: 100,
    };

    /** @type {{ round: number; guesses: number; finishedAt: string }[]} */
    let history = loadHistory();

    // ─── DOM refs ────────────────────────────────────────────────────────────────
    const messageEl    = document.getElementById('message');
    const rangeHintEl  = document.getElementById('rangeHint');
    const guessInput   = document.getElementById('guessInput');
    const submitBtn    = document.getElementById('submitBtn');
    const restartBtn   = document.getElementById('restartBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const roundNumEl   = document.getElementById('roundNum');
    const guessCountEl = document.getElementById('guessCount');
    const bestScoreEl  = document.getElementById('bestScore');
    const historyList  = document.getElementById('historyList');

    // ─── LocalStorage helpers ────────────────────────────────────────────────────
    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    // ─── Game logic ──────────────────────────────────────────────────────────────
    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function newGame() {
      state.answer     = randomInt(1, 100);
      state.guessCount = 0;
      state.isFinished = false;
      state.rangeMin   = 1;
      state.rangeMax   = 100;

      guessInput.disabled = false;
      submitBtn.disabled  = false;
      restartBtn.style.display = 'none';

      setMessage('請開始猜數字！', 'msg-default');
      rangeHintEl.textContent = '';
      guessInput.value = '';
      guessInput.focus();

      renderStats();
    }

    function submitGuess() {
      if (state.isFinished) return;

      const raw = guessInput.value.trim();

      // Validation
      if (raw === '') {
        setMessage('請輸入 1 到 100 的整數', 'msg-error');
        return;
      }

      const num = Number(raw);

      if (!Number.isInteger(num) || num < 1 || num > 100) {
        setMessage('請輸入 1 到 100 的整數', 'msg-error');
        guessInput.select();
        return;
      }

      // Valid guess
      state.guessCount++;

      if (num > state.answer) {
        state.rangeMax = Math.min(state.rangeMax, num - 1);
        setMessage('大了 ↓', 'msg-high');
        updateRangeHint();
      } else if (num < state.answer) {
        state.rangeMin = Math.max(state.rangeMin, num + 1);
        setMessage('小了 ↑', 'msg-low');
        updateRangeHint();
      } else {
        // Correct!
        state.isFinished = true;
        setMessage('🎉 恭喜通過！', 'msg-win');
        rangeHintEl.textContent = `本局共猜了 ${state.guessCount} 次`;

        guessInput.disabled = true;
        submitBtn.disabled  = true;
        restartBtn.style.display = 'inline-block';

        recordRound();
      }

      guessInput.value = '';
      guessInput.focus();
      renderStats();
    }

    function recordRound() {
      const entry = {
        round: state.round,
        guesses: state.guessCount,
        finishedAt: new Date().toISOString(),
      };
      history.push(entry);
      state.round++;
      saveHistory();
      renderHistory();
    }

    // ─── UI helpers ──────────────────────────────────────────────────────────────
    function setMessage(text, cls) {
      messageEl.textContent = text;
      messageEl.className = cls;
    }

    function updateRangeHint() {
      if (state.rangeMin <= state.rangeMax) {
        rangeHintEl.textContent = `目前可猜範圍：${state.rangeMin} ~ ${state.rangeMax}`;
      }
    }

    function getBest() {
      if (history.length === 0) return null;
      return Math.min(...history.map(h => h.guesses));
    }

    function renderStats() {
      roundNumEl.textContent   = state.round;
      guessCountEl.textContent = state.guessCount;
      const best = getBest();
      bestScoreEl.textContent  = best !== null ? best : '—';
    }

    function renderHistory() {
      historyList.innerHTML = '';
      const best = getBest();

      // Show newest first
      [...history].reverse().forEach(entry => {
        const li = document.createElement('li');
        if (entry.guesses === best) li.classList.add('best-record');

        const date = new Date(entry.finishedAt);
        const timeStr = date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr = date.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });

        li.innerHTML = `
          <span class="round-info">第 ${entry.round} 局</span>
          <span class="round-guesses">${entry.guesses} 次${entry.guesses === best ? ' 🏆' : ''}</span>
          <span class="round-time">${dateStr} ${timeStr}</span>
        `;
        historyList.appendChild(li);
      });

      renderStats();
    }

    // ─── Event listeners ─────────────────────────────────────────────────────────
    submitBtn.addEventListener('click', submitGuess);

    guessInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitGuess();
    });

    restartBtn.addEventListener('click', newGame);

    clearBtn.addEventListener('click', () => {
      if (history.length === 0) return;
      if (!confirm('確定要清除所有歷史紀錄嗎？')) return;
      history = [];
      saveHistory();
      renderHistory();
    });

    // ─── Init ────────────────────────────────────────────────────────────────────
    // Restore round counter from history
    if (history.length > 0) {
      state.round = Math.max(...history.map(h => h.round)) + 1;
    }

    renderHistory();
    newGame();
  </script>
</body>
</html>
